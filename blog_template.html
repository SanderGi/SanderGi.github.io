<!DOCTYPE html>
<html>
  <head>
    <title>Alex Metzger</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="icon" type="image/x-icon" href="/images/icons8-coding-64.png" />
    <style>
      .search-container {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
      }

      #search-input {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
      }

      .tag-filters {
        margin-top: 10px;
      }

      .tag {
        display: inline-block;
        padding: 5px 10px;
        background-color: #f0f0f0;
        border: 1px solid #ddd;
        border-radius: 15px;
        margin-right: 5px;
        margin-bottom: 5px;
        cursor: pointer;
        text-shadow: none;
      }

      .tag.active {
        background-color: #B1B2FF;
        color: white;
      }

      .item {
        padding: 10px;
        border: 1px solid #eee;
        margin-bottom: 5px;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body class="is-preload">
    <!-- Nav -->
    <nav id="nav">
      <ul class="container">
        <li><a href="index.html#top">Home</a></li>
        <li><a href="index.html#work">About</a></li>
        <li><a href="index.html#portfolio">Portfolio</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>

    <article id="portfolio" class="wrapper style3">
      <div class="container">
        <header style="margin-bottom: 1em">
          <h2 id="blog">Blog.</h2>
          <p>
            Read about my research, my side-projects, and my interests.
          </p>
        </header>

        <div class="search-container">
          <input type="search" id="search-input" placeholder="Search..." />
          <div class="tag-filters">
            <span class="tag" data-tag="Research">Research</span>
            <span class="tag" data-tag="Project">Projects</span>
            <span class="tag" data-tag="Tutorial">Tutorials</span>
            <span class="tag" data-tag="SWE">SWE</span>
            <span class="tag" data-tag="Math">Math</span>
            <span class="tag" data-tag="ML">ML</span>
          </div>
        </div>

        <div id="item-list" style="text-align: left;">
          {blog_list}
        </div>
      </div>
    </article>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const searchInput = document.getElementById("search-input");
        const tagFilters = document.querySelectorAll(".tag");
        const items = document.getElementById("item-list").children;

        function filterItems() {
          const searchTerm = searchInput.value.toLowerCase();
          const activeTags = Array.from(tagFilters)
            .filter((tag) => tag.classList.contains("active"))
            .map((tag) => tag.dataset.tag);

          [...items].forEach((item) => {
            const itemText = item.textContent.toLowerCase();
            const itemTags = item.dataset.tags
              ? item.dataset.tags.split(",")
              : [];

            const matchesSearch = itemText.includes(searchTerm);
            const matchesTags =
              activeTags.length === 0 ||
              activeTags.every((tag) => itemTags.includes(tag));

            if (matchesSearch && matchesTags) {
              item.style.display = "flex";
            } else {
              item.style.display = "none";
            }
          });
        }

        searchInput.addEventListener("input", filterItems);

        tagFilters.forEach((tag) => {
          tag.addEventListener("click", () => {
            tag.classList.toggle("active");
            filterItems();
          });
        });

        filterItems(); // Initial filter on page load
      });
    </script>
  </body>
</html>
