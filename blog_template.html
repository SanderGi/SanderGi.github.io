<!DOCTYPE html>
<html>
  <head>
    <title>Alex Metzger</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <link rel="stylesheet" href="assets/css/refresh.css" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  </head>
  <body class="is-preload">
    <!-- Nav -->
    <nav id="nav">
      <ul class="container">
        <li><a href="index.html#top">Home</a></li>
        <li><a href="index.html#work">Research</a></li>
        <li><a href="index.html#portfolio">Portfolio</a></li>
        <li><a href="blog.html">Writing</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>

    <article id="portfolio" class="wrapper style3">
      <div class="container">
        <header style="margin-bottom: 1em">
          <p class="eyebrow">Writing</p>
          <h2 id="blog">Research notes for curious people.</h2>
          <p>
            Plain-language tours through the papers, prototypes, and ponderings
            behind my work.
          </p>
        </header>

        <div class="search-container">
          <label class="sr-only" for="search-input">Search writing</label>
          <input type="search" id="search-input" placeholder="Search..." />
          <div class="tag-filters">
            <button type="button" class="tag" data-tag="Research" aria-pressed="false">Research</button>
            <button type="button" class="tag" data-tag="Speech" aria-pressed="false">Speech</button>
            <button type="button" class="tag" data-tag="Sustainability" aria-pressed="false">Sustainability</button>
            <button type="button" class="tag" data-tag="Access" aria-pressed="false">Access</button>
            <button type="button" class="tag" data-tag="Algorithms" aria-pressed="false">Algorithms</button>
            <button type="button" class="tag" data-tag="Math" aria-pressed="false">Math</button>
            <button type="button" class="tag" data-tag="ML" aria-pressed="false">ML</button>
          </div>
        </div>

        <div id="item-list" class="blog-list">
          {blog_list}
        </div>
      </div>
    </article>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const searchInput = document.getElementById("search-input");
        const tagFilters = document.querySelectorAll(".tag");
        const items = document.getElementById("item-list").children;

        function filterItems() {
          const searchTerm = searchInput.value.toLowerCase();
          const activeTags = Array.from(tagFilters)
            .filter((tag) => tag.classList.contains("active"))
            .map((tag) => tag.dataset.tag);

          [...items].forEach((item) => {
            const itemText = item.textContent.toLowerCase();
            const itemTags = item.dataset.tags
              ? item.dataset.tags.split(",")
              : [];

            const matchesSearch = itemText.includes(searchTerm);
            const matchesTags =
              activeTags.length === 0 ||
              activeTags.every((tag) => itemTags.includes(tag));

            if (matchesSearch && matchesTags) {
              item.style.display = "";
            } else {
              item.style.display = "none";
            }
          });
        }

        searchInput.addEventListener("input", filterItems);

        tagFilters.forEach((tag) => {
          tag.addEventListener("click", () => {
            tag.classList.toggle("active");
            tag.setAttribute("aria-pressed", tag.classList.contains("active") ? "true" : "false");
            filterItems();
          });
        });

        filterItems(); // Initial filter on page load
      });
    </script>
    <script src="assets/js/site.js"></script>
  </body>
</html>
